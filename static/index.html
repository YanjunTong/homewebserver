<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媒体中心 - 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .nav-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        .nav-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .nav-card.images {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .nav-card.videos {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .nav-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .nav-title {
            font-size: 1.8em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .nav-desc {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            color: white;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .nav-grid {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            header {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 媒体中心</h1>
            <p class="subtitle">组织和浏览您的所有媒体文件</p>

            <nav class="nav-grid">
                <a href="images.html" class="nav-card images">
                    <div class="nav-icon">🖼️</div>
                    <div class="nav-title">图片库</div>
                    <div class="nav-desc">浏览所有图片</div>
                </a>

                <a href="videos.html" class="nav-card videos">
                    <div class="nav-icon">🎥</div>
                    <div class="nav-title">视频库</div>
                    <div class="nav-desc">浏览所有视频</div>
                </a>
            </nav>

            <div class="stats" id="stats">
                <div class="stat-box">
                    <span class="stat-number" id="totalCount">0</span>
                    <span class="stat-label">总文件数</span>
                </div>
                <div class="stat-box">
                    <span class="stat-number" id="imageCount">0</span>
                    <span class="stat-label">图片数量</span>
                </div>
                <div class="stat-box">
                    <span class="stat-number" id="videoCount">0</span>
                    <span class="stat-label">视频数量</span>
                </div>
            </div>
        </header>

        <footer>
            <p>© 2026 HomeMedia Hub | 本地媒体管理系统</p>
        </footer>
    </div>

    <script>
        async function loadStats() {
            try {
                // 获取总数量
                const countRes = await fetch('/media/count');
                const countData = await countRes.json();
                document.getElementById('totalCount').textContent = countData.count;

                // 获取所有媒体统计类型
                const mediaRes = await fetch('/media?skip=0&limit=5000');
                const mediaData = await mediaRes.json();

                const images = mediaData.filter(m => m.media_type === 'image').length;
                const videos = mediaData.filter(m => m.media_type === 'video').length;

                document.getElementById('imageCount').textContent = images;
                document.getElementById('videoCount').textContent = videos;
            } catch (error) {
                console.error('统计加载失败:', error);
            }
        }

        loadStats();
    </script>
</body>
</html>
